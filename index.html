                                                                <div className="text-sm text-slate-700 dark:text-slate-300 custom-line-clamp font-medium">{j.content}</div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    /* NORMAL TAKVİM GÖRÜNÜMÜ */
                                    <div className="glass-card p-4 sm:p-6 flex-1 flex flex-col shadow-sm">
                                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                                            <h2 className="text-2xl font-black text-slate-800 dark:text-white flex items-center gap-2"><CalendarDays className="text-primary-500"/> Takvim & Arşiv</h2>
                                            
                                            <div className="flex items-center gap-3 w-full sm:w-auto">
                                                {/* TOPLU SİLME BUTONU */}
                                                <button onClick={()=>{
                                                    const mTasks = tasks.filter(t => t.date.startsWith(`${calDate.getFullYear()}-${String(calDate.getMonth()+1).padStart(2,'0')}`));
                                                    if(mTasks.length===0) return Toast.fire({icon:'info', title:'Bu ay silinecek görev yok.'});
                                                    setSelectedTaskIdsForDelete(mTasks.map(t=>t.id));
                                                    setShowBulkDeleteModal(true);
                                                }} className="p-2 text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/30 rounded-xl transition-colors" title="Bu Aydaki Görevleri Yönet"><Trash2 size={20}/></button>
                                                
                                                <div className="flex flex-1 sm:flex-none justify-between bg-slate-50 dark:bg-slate-900 p-1.5 rounded-xl border border-slate-200 dark:border-slate-800">
                                                    <button onClick={()=>setCalDate(new Date(calDate.getFullYear(), calDate.getMonth()-1, 1))} className="p-2 hover:bg-white dark:hover:bg-slate-800 rounded-lg transition-colors"><ChevronLeft size={20}/></button>
                                                    <span className="font-bold flex items-center justify-center min-w-[120px] text-slate-700 dark:text-slate-200">{getMonthName(calDate.getMonth())} {calDate.getFullYear()}</span>
                                                    <button onClick={()=>setCalDate(new Date(calDate.getFullYear(), calDate.getMonth()+1, 1))} className="p-2 hover:bg-white dark:hover:bg-slate-800 rounded-lg transition-colors"><ChevronRight size={20}/></button>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="calendar-grid mb-2">
                                            {['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'].map(d => (
                                                <div key={d} className="text-center text-xs font-bold text-slate-400 py-2 uppercase tracking-wider">{d}</div>
                                            ))}
                                        </div>
                                        <div className="calendar-grid flex-1">
                                            {generateCalendarDays().map((dateStr, idx) => {
                                                if(!dateStr) return <div key={`empty-${idx}`} className="p-2 min-h-[70px] sm:min-h-[110px] bg-transparent"></div>;
                                                
                                                const dayNum = parseInt(dateStr.split('-')[2]);
                                                const isToday = dateStr === getTodayDate();
                                                const isPast = dateStr < getTodayDate();
                                                const dayTasks = tasks.filter(t => t.date === dateStr);
                                                const hasJournal = !!journals[dateStr]?.content || (journals[dateStr]?.images && journals[dateStr].images.length > 0);

                                                return (
                                                    <div key={dateStr} 
                                                        onClick={()=>{ setSelectedDate(dateStr); setActiveTab('daily'); }}
                                                        className={`p-2 min-h-[70px] sm:min-h-[110px] rounded-xl border cursor-pointer transition-all flex flex-col group
                                                        ${isToday ? 'border-primary-500 bg-primary-50/50 dark:bg-primary-900/10 shadow-sm ring-1 ring-primary-500/50' : 'border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 hover:border-primary-300 hover:shadow-md'}
                                                    `}>
                                                        <div className="flex justify-between items-start mb-1.5">
                                                            <span className={`text-sm font-bold w-6 h-6 flex items-center justify-center rounded-full transition-colors ${isToday ? 'bg-primary-500 text-white shadow-md' : 'text-slate-600 dark:text-slate-400 group-hover:text-primary-600 dark:group-hover:text-primary-400'}`}>{dayNum}</span>
                                                            {hasJournal && <div className="w-2 h-2 rounded-full bg-amber-400 mt-1 shadow-[0_0_6px_rgba(251,191,36,0.8)]"></div>}
                                                        </div>
                                                        <div className="flex-1 flex flex-col gap-1 overflow-hidden">
                                                            {/* Masaüstü liste görünümü */}
                                                            <div className="hidden sm:flex flex-col gap-1">
                                                                {dayTasks.slice(0, 3).map(t => {
                                                                    let taskColor = '';
                                                                    if (t.status === 'completed') taskColor = 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 line-through decoration-emerald-400 opacity-60';
                                                                    else if (isPast) taskColor = 'bg-rose-50 dark:bg-rose-900/20 text-rose-600 font-bold border border-rose-200 dark:border-rose-800/50 shadow-sm';
                                                                    else taskColor = 'bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-400 font-medium';
                                                                    
                                                                    return (
                                                                        <div key={t.id} className={`text-xs truncate px-1.5 py-0.5 rounded ${taskColor}`}>
                                                                            {t.title}
                                                                        </div>
                                                                    );
                                                                })}
                                                                {dayTasks.length > 3 && <div className="text-[10px] text-slate-400 font-bold px-1 text-center">+{dayTasks.length - 3}</div>}
                                                            </div>
                                                            {/* Mobil nokta görünümü (Daha temiz) */}
                                                            <div className="flex sm:hidden flex-wrap gap-1 mt-1 justify-start">
                                                                {dayTasks.slice(0, 6).map(t => {
                                                                    let dotColor = 'bg-blue-500';
                                                                    if (t.status === 'completed') dotColor = 'bg-emerald-400';
                                                                    else if (isPast) dotColor = 'bg-rose-500';
                                                                    return <div key={t.id} className={`w-1.5 h-1.5 rounded-full ${dotColor}`}></div>

{activeTab === 'otherApp' && (

<div className="w-full bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden" style={{ minHeight: '85vh' }}>

                                        </div>
                                    </div>

                                    {/* YENİ NESİL ÇOKLU EKLEME BUTONLARI & TARİH ARALIĞI */}
                                    {!taskForm.id && (
                                        <div>
                                            <label className="text-[11px] font-bold text-primary-600 dark:text-primary-400 block mb-2 uppercase tracking-wider flex items-center gap-1"><Repeat size={14}/> Toplu / Çoklu Ekleme</label>
                                            <div className="grid grid-cols-2 gap-2 mb-2">
                                                <button onClick={()=>setTaskForm({...taskForm, repeat: 'none'})} className={`p-2.5 rounded-xl border font-bold text-xs transition-all ${taskForm.repeat === 'none' ? 'bg-primary-50 border-primary-500 text-primary-600 dark:bg-primary-900/30 dark:text-primary-400' : 'bg-white border-slate-200 text-slate-500 dark:bg-slate-900 dark:border-slate-700'}`}>Sadece Bu Gün</button>
                                                <button onClick={()=>setTaskForm({...taskForm, repeat: 'this_week'})} className={`p-2.5 rounded-xl border font-bold text-xs transition-all ${taskForm.repeat === 'this_week' ? 'bg-primary-50 border-primary-500 text-primary-600 dark:bg-primary-900/30 dark:text-primary-400' : 'bg-white border-slate-200 text-slate-500 dark:bg-slate-900 dark:border-slate-700'}`}>Haftanın Tümü</button>
                                                <button onClick={()=>setTaskForm({...taskForm, repeat: 'this_month'})} className={`p-2.5 rounded-xl border font-bold text-xs transition-all ${taskForm.repeat === 'this_month' ? 'bg-primary-50 border-primary-500 text-primary-600 dark:bg-primary-900/30 dark:text-primary-400' : 'bg-white border-slate-200 text-slate-500 dark:bg-slate-900 dark:border-slate-700'}`}>Ayın Tümü</button>
                                                <button onClick={()=>setTaskForm({...taskForm, repeat: 'custom_range'})} className={`p-2.5 rounded-xl border font-bold text-xs transition-all ${taskForm.repeat === 'custom_range' ? 'bg-primary-50 border-primary-500 text-primary-600 dark:bg-primary-900/30 dark:text-primary-400' : 'bg-white border-slate-200 text-slate-500 dark:bg-slate-900 dark:border-slate-700'}`}>Tarih Aralığı...</button>
                                            </div>
                                            {taskForm.repeat === 'custom_range' && (
                                                <div className="mt-3 p-3 bg-primary-50/50 dark:bg-primary-900/10 rounded-xl border border-primary-100 dark:border-primary-800/50 flex items-center gap-3 animate-fade-in">
                                                    <span className="text-sm font-bold text-slate-500">Bitiş:</span>
                                                    <input type="date" value={taskForm.repeatEndDate} onChange={e=>setTaskForm({...taskForm, repeatEndDate: e.target.value})} className="flex-1 p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-900 dark:text-white outline-none focus:border-primary-500 text-sm font-bold"/>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                </div>
                                <div className="p-4 border-t border-slate-100 dark:border-slate-800 flex gap-3 bg-slate-50 dark:bg-slate-900 rounded-b-[2rem] sm:rounded-b-[1.5rem]">
                                    {taskForm.id && <button onClick={()=>{deleteTask(taskForm.id);}} className="p-4 bg-white dark:bg-slate-800 border border-rose-100 dark:border-rose-900 text-rose-500 rounded-xl hover:bg-rose-50 transition-colors shadow-sm"><Trash2 size={20}/></button>}
                                    <button onClick={saveTask} className="flex-1 bg-slate-900 hover:bg-slate-800 dark:bg-primary-600 dark:hover:bg-primary-500 text-white py-4 rounded-xl font-bold flex justify-center items-center gap-2 shadow-lg transition-transform active:scale-95 text-lg"><Save size={20}/> Kaydet</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: WIPE DATA CONFIRMATION */}
                    {showWipeDataModal && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[70] p-4 backdrop-blur-sm">
                            <div className="bg-white dark:bg-slate-950 rounded-3xl w-full max-w-md shadow-2xl animate-pop-in flex flex-col border border-slate-200 dark:border-slate-800 overflow-hidden">
                                <div className="p-5 border-b border-rose-100 dark:border-rose-900/50 bg-rose-50 dark:bg-rose-900/20">
                                    <h3 className="font-black text-xl text-rose-600 dark:text-rose-400 flex items-center gap-2"><ShieldAlert size={24}/> Güvenlik Doğrulaması</h3>
                                </div>
                                <div className="p-6">
                                    <p className="font-bold text-slate-800 dark:text-slate-200 mb-2">Tüm verilerinizi (görevler, notlar, günlükler) kalıcı olarak siliyorsunuz!</p>
                                    
                                    {user.providerData.some(p => p.providerId === 'google.com') ? (
                                        <p className="text-sm text-slate-500 mb-6">Sisteme Google hesabınız ile bağlandınız. Bu tehlikeli işlemi onaylamak için verilerin silineceği butona bastığınızda Google doğrulama penceresi açılacaktır.</p>
                                    ) : (
                                        <>
                                            <p className="text-sm text-slate-500 mb-6">Bu işlemi onaylamak için lütfen şifrenizi iki defa girin.</p>
                                            <div className="space-y-4">
                                                <input type="password" value={wipePassword} onChange={e=>setWipePassword(e.target.value)} className="w-full p-4 border border-rose-200 dark:border-rose-900 bg-rose-50/50 dark:bg-rose-950 dark:text-white rounded-xl outline-none focus:border-rose-500 transition-colors" placeholder="Mevcut Şifreniz" required/>
                                                <input type="password" value={wipePasswordConfirm} onChange={e=>setWipePasswordConfirm(e.target.value)} className="w-full p-4 border border-rose-200 dark:border-rose-900 bg-rose-50/50 dark:bg-rose-950 dark:text-white rounded-xl outline-none focus:border-rose-500 transition-colors" placeholder="Şifrenizi Tekrar Girin" required/>
                                            </div>
                                        </>
                                    )}
                                </div>
                                <div className="p-4 border-t border-slate-100 dark:border-slate-800 flex gap-2 bg-slate-50 dark:bg-slate-900">
                                    <button onClick={()=>{setShowWipeDataModal(false); setWipePassword(''); setWipePasswordConfirm('');}} className="flex-1 p-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-xl font-bold hover:bg-slate-50 transition-colors">İptal Et</button>
                                    <button onClick={executeWipeData} className="flex-1 p-3 bg-rose-600 hover:bg-rose-500 text-white rounded-xl font-bold shadow-lg transition-colors">Kalıcı Olarak Sil</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: BULK DELETE TASKS */}
                    {showBulkDeleteModal && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[60] p-4 backdrop-blur-sm">
                            <div className="bg-white dark:bg-slate-900 rounded-3xl w-full max-w-md shadow-2xl animate-pop-in flex flex-col border border-slate-200 dark:border-slate-800 overflow-hidden">
                                <div className="p-5 border-b border-slate-100 dark:border-slate-800 bg-rose-50 dark:bg-rose-900/20">
                                    <h3 className="font-black text-lg text-rose-600 dark:text-rose-400 flex items-center gap-2"><AlertTriangle size={20}/> Toplu Görev Silme</h3>
                                    <p className="text-xs text-rose-500 mt-1">{getMonthName(calDate.getMonth())} {calDate.getFullYear()} ayındaki tüm görevler ({selectedTaskIdsForDelete.length}) silinecek.</p>
                                </div>
                                <div className="p-6 text-center">
                                    <Trash2 size={48} className="mx-auto text-slate-300 dark:text-slate-600 mb-4"/>
                                    <p className="font-medium text-slate-600 dark:text-slate-300">Bu işlem bu aydaki tüm görevleri kalıcı olarak siler ve geri alınamaz.</p>
                                </div>
                                <div className="p-4 border-t border-slate-100 dark:border-slate-800 flex gap-2 bg-slate-50 dark:bg-slate-950">
                                    <button onClick={()=>setShowBulkDeleteModal(false)} className="flex-1 p-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-xl font-bold hover:bg-slate-50">İptal Et</button>
                                    <button onClick={executeBulkDelete} className="flex-1 p-3 bg-rose-600 hover:bg-rose-500 text-white rounded-xl font-bold shadow-lg">Evet, Hepsini Sil</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: RICH TEXT NOTE (OKUMA VE DÜZENLEME MODU) */}
                    {showNoteModal && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[60] p-0 sm:p-6 backdrop-blur-sm">
                            <div className="bg-white dark:bg-slate-950 rounded-t-[1.5rem] sm:rounded-[1.5rem] w-full max-w-4xl shadow-2xl animate-slide-up flex flex-col h-[100vh] sm:h-[85vh] border border-slate-200 dark:border-slate-800 mt-auto sm:mt-0">
                                <div className="p-4 sm:p-5 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center shrink-0 bg-slate-50 dark:bg-slate-900">
                                    <div className="flex-1 mr-2 sm:mr-4 flex flex-col overflow-hidden">
                                        {isNoteEditing ? (
                                            <input type="text" value={currentNote.title} onChange={e=>setCurrentNote({...currentNote, title: e.target.value})} placeholder="Not Başlığı..." className="text-xl sm:text-2xl font-black bg-transparent outline-none text-slate-800 dark:text-white w-full placeholder-slate-400"/>
                                        ) : (
                                            <h2 className="text-xl sm:text-2xl font-black text-slate-800 dark:text-white truncate">{currentNote.title || 'İsimsiz Not'}</h2>
                                        )}
                                        
                                        <div className="flex items-center gap-2 mt-1.5">
                                            <Calendar size={12} className="text-slate-400"/>
                                            {isNoteEditing ? (
                                                <input type="date" value={currentNote.customDate || getTodayDate()} onChange={e=>setCurrentNote({...currentNote, customDate: e.target.value})} className="text-xs font-bold text-slate-500 bg-transparent outline-none cursor-pointer uppercase"/>
                                            ) : (
                                                <span className="text-xs font-bold text-slate-500 uppercase">{formatDateTr(currentNote.customDate || currentNote.updatedAt)}</span>
                                            )}
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-1 sm:gap-2">
                                        {isNoteEditing ? (
                                            <button onClick={saveNote} className="bg-slate-900 dark:bg-primary-600 text-white px-4 sm:px-6 py-2.5 sm:py-3 rounded-xl font-bold text-sm hover:bg-slate-800 dark:hover:bg-primary-500 flex items-center gap-2 shadow-md"><Save size={18}/> <span className="hidden sm:inline">Kaydet</span></button>
                                        ) : (
                                            <button onClick={()=>setIsNoteEditing(true)} className="bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-slate-200 px-4 sm:px-5 py-2.5 sm:py-3 rounded-xl font-bold text-sm hover:bg-slate-200 dark:hover:bg-slate-700 flex items-center gap-2"><Edit3 size={18}/> <span className="hidden sm:inline">Düzenle</span></button>
                                        )}
                                        <button onClick={()=>setShowNoteModal(false)} className="p-2.5 sm:p-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition-colors"><X size={20}/></button>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-hidden flex flex-col bg-slate-50 dark:bg-slate-900 p-0 sm:p-4 sm:pb-0">
                                    {isNoteEditing ? (
                                        <RichEditor key={currentNote.id || 'new'} initialContent={currentNote.content} contentRef={noteContentRef} />
                                    ) : (
                                        <div className="read-only-note overflow-y-auto p-5 sm:p-2 bg-white dark:bg-slate-950 sm:rounded-2xl border-x-0 sm:border border-slate-200 dark:border-slate-800 h-full" dangerouslySetInnerHTML={{__html: sanitizeHTML(currentNote.content) || '<p class="text-slate-400 italic">Bu not boş...</p>'}}></div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: IMAGE VIEWER (FULL SCREEN GALLERY) */}
                    {viewingImageIndex !== null && localJournalImages.length > 0 && (
                        <div className="fixed inset-0 bg-black/95 z-[70] flex flex-col items-center justify-center p-4 backdrop-blur-md" onClick={() => setViewingImageIndex(null)}>
                            <div className="absolute top-4 w-full flex justify-between px-4 z-10">
                                <span className="text-white/50 font-bold bg-black/50 px-3 py-1 rounded-lg">{viewingImageIndex + 1} / {localJournalImages.length}</span>
                                <button className="text-white p-2 bg-black/50 rounded-full hover:bg-rose-600 transition-colors"><X size={24}/></button>
                            </div>
                            
                            <div className="relative w-full max-w-4xl h-full flex items-center justify-center" onClick={(e) => e.stopPropagation()}>
                                {localJournalImages.length > 1 && (
                                    <button onClick={(e)=>{e.stopPropagation(); setViewingImageIndex(prev => prev === 0 ? localJournalImages.length - 1 : prev - 1);}} className="absolute left-0 p-3 bg-black/50 hover:bg-black text-white rounded-full transition-colors"><ChevronLeft size={32}/></button>
                                )}
                                
                                <img src={localJournalImages[viewingImageIndex]} className="max-w-full max-h-[85vh] object-contain rounded-xl shadow-2xl" />
                                
                                {localJournalImages.length > 1 && (
                                    <button onClick={(e)=>{e.stopPropagation(); setViewingImageIndex(prev => prev === localJournalImages.length - 1 ? 0 : prev + 1);}} className="absolute right-0 p-3 bg-black/50 hover:bg-black text-white rounded-full transition-colors"><ChevronRight size={32}/></button>
                                )}
                            </div>
                            
                            {/* Thumbnails */}
                            <div className="absolute bottom-4 flex gap-2 overflow-x-auto max-w-full px-4" onClick={e=>e.stopPropagation()}>
                                {localJournalImages.map((img, idx) => (
                                    <img key={idx} src={img} onClick={()=>setViewingImageIndex(idx)} className={`w-16 h-16 object-cover rounded-lg cursor-pointer border-2 transition-all ${idx === viewingImageIndex ? 'border-primary-500 scale-110' : 'border-transparent opacity-50 hover:opacity-100'}`}/>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
